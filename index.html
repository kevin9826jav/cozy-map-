<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Travel Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🗺️ Cozy Travel Tracker</h1>
            <p>Track your dream destinations and celebrate your adventures</p>
        </header>

        <div class="controls">
            <div class="search-container">
                <input type="text" id="location-search" placeholder="Search for a place..." autocomplete="off">
                <div class="button-group">
                    <button id="add-goal" class="btn btn-goal">📍 Add to Goals</button>
                    <button id="add-visited" class="btn btn-visited">✅ Mark as Visited</button>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-label">
                    <span>Progress</span>
                    <span id="progress-text">0% (0/0)</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </div>

        <div id="map" class="map-container"></div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="goals-count">0</span>
                <span class="stat-label">Goals</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="visited-count">0</span>
                <span class="stat-label">Visited</span>
            </div>
            <div class="stat-item">
                <button id="reset-btn" class="btn btn-reset">🔄 Reset All</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- Google Maps API with Places library -->
    <script async defer 
            src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap">
    </script>
</body>
</html>
