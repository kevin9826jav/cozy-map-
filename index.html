<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Travel Progress</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🌍 Cozy Travel Progress</h1>
            <p class="subtitle">Track your adventures and dream destinations</p>
        </header>

        <div class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="location-search" 
                    placeholder="Search for a place..."
                    autocomplete="off"
                >
                <div class="button-group">
                    <button id="add-goal" class="btn btn-goal">
                        <span class="btn-icon">🎯</span>
                        Add to Goals
                    </button>
                    <button id="add-visited" class="btn btn-visited">
                        <span class="btn-icon">✅</span>
                        Add to Visited
                    </button>
                </div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-info">
                <span class="progress-text">Progress: <span id="progress-text">0/0</span></span>
                <span class="progress-percentage" id="progress-percentage">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-content">
                    <div class="stat-number" id="goals-count">0</div>
                    <div class="stat-label">Goals</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-content">
                    <div class="stat-number" id="visited-count">0</div>
                    <div class="stat-label">Visited</div>
                </div>
            </div>
            <div class="stat-card">
                <button id="reset-btn" class="reset-btn">
                    <span class="reset-icon">🔄</span>
                    Reset
                </button>
            </div>
        </div>
    </div>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>
    <script src="script.js"></script>
</body>
</html>
